{% extends 'base.html' %}

{% block title %}Вхід - Бахча{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="panel p-4">
            <h1 class="h3 mb-4">Вхід</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="mb-3">
                    <label class="form-label" for="{{ form.login.id_for_label }}">Телефон або email</label>
                    {{ form.login }}
                </div>
                <div class="mb-4">
                    <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
                    {{ form.password }}
                </div>
                <button class="btn btn-primary w-100" type="submit">Увійти</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
